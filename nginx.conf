server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Root redirect to Italian
    location = / {
        return 302 /it;
    }

    # Legacy paths redirect to /it equivalents
    location = /portfolio {
        return 301 /it/portfolio;
    }
    location = /projects {
        return 301 /it/projects;
    }
    location ^~ /projects/ {
        return 301 /it$request_uri;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
